name: Build & Deploy (GitHub Pages + Hetzner)

# main ist der einzige Deploy-Branch: Was auf main liegt, ist live.
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_hetzner: ${{ steps.check.outputs.has_hetzner }}
    steps:
      - uses: actions/checkout@v4

      # secrets sind in Job-Level-if nicht verfügbar → hier als Output bereitstellen.
      - name: Hetzner-Secrets vorhanden?
        id: check
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: echo "has_hetzner=${{ env.HETZNER_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: dotnet publish src/Portfolio/Portfolio.csproj -c Release -o publish

      # Ein Build, zwei Varianten: nur die <base href> unterscheidet sich.
      - name: Variante für GitHub Pages (Unterpfad /PORTFOLIO/)
        run: |
          mkdir -p out-pages
          cp -r publish/wwwroot/. out-pages/
          sed -i 's|<base href="/" />|<base href="/PORTFOLIO/" />|' out-pages/index.html
          touch out-pages/.nojekyll

      - name: Variante für Hetzner (Root-Pfad)
        run: |
          mkdir -p out-hetzner
          cp -r publish/wwwroot/. out-hetzner/

      - name: Upload Pages-Artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: out-pages

      - name: Upload Hetzner-Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: site-hetzner
          path: out-hetzner
          retention-days: 3

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Statische Build-Dateien per rsync nach /var/www/portfolio (wird von Caddy
  # read-only gemountet, siehe docker-compose.yml).
  deploy-hetzner-files:
    needs: build
    runs-on: ubuntu-latest
    # Läuft erst, wenn die SSH-Secrets im Repo hinterlegt sind.
    if: ${{ needs.build.outputs.has_hetzner == 'true' }}
    steps:
      - name: Download Hetzner-Artefakt
        uses: actions/download-artifact@v4
        with:
          name: site-hetzner
          path: site

      - name: rsync auf den Server (/var/www/portfolio)
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avz --delete
          path: site/
          remote_path: /var/www/portfolio/
          remote_host: ${{ secrets.HETZNER_HOST }}
          remote_user: ${{ secrets.HETZNER_USER }}
          remote_key: ${{ secrets.HETZNER_SSH_KEY }}

  # Caddy/docker-compose dieses Repos auf dem Server aktuell halten (Caddyfile,
  # Reverse-Proxy-Regeln). Läuft unabhängig vom Dateien-Job oben.
  deploy-hetzner-infra:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.outputs.has_hetzner == 'true' }}
    steps:
      - name: Caddy-Stack auf dem Server aktualisieren
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          passphrase: ${{ secrets.HETZNER_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            docker network inspect web >/dev/null 2>&1 || docker network create web
            cd /var/www/portfolio-infra
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose up -d --build
